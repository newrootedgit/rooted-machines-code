; PlatformIO Project Configuration File
;
; ClearCore firmware for the harvester I/O coprocessor.
; Shared protocol header lives in ../shared/include/protocol/messages.h
; (see docs/COMMUNICATION.md).
;
; ClearCore is not in the stock PlatformIO atmelsam platform. We use
; patrickwasp's community fork which adds the ClearCore board definition.
; Upstream feature request: platformio/platform-atmelsam#175

[platformio]
default_envs = clearcore

[env:clearcore]
platform = https://github.com/patrickwasp/platform-atmelsam
board = clearcore
framework = arduino

; Pull in the shared protocol header so firmware can include
; <protocol/messages.h> directly.
build_flags =
    -I../shared/include
    -Wall
    -Wextra

; Upload via the on-board USB bootloader. No external programmer needed.
; Auto-detects; uncomment and set explicitly if multiple ACM devices are
; attached.
; upload_port = /dev/ttyACM0
; monitor_port = /dev/ttyACM0

monitor_speed = 9600
